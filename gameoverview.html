<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Project — Pedro Neves</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=Syne:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="gameoverviewstyles.css">
</head>
<body class="portfolio-body page-game-overview">
    <script>
        (function () {
            try {
                if (localStorage.getItem('pn_portfolio_theme') === 'light') {
                    document.body.classList.remove('theme-dark');
                } else {
                    document.body.classList.add('theme-dark');
                }
            } catch (e) {
                document.body.classList.add('theme-dark');
            }
        })();
    </script>
    <canvas id="ambient-canvas" aria-hidden="true"></canvas>
    <div class="grain" aria-hidden="true"></div>

    <a href="index.html#projects" class="go-overview go-overview--back">&larr; Back to projects</a>

    <main class="overview-main">
        <header class="overview-hero">
            <span class="overview-kicker" id="overview-index" aria-hidden="true"></span>
            <h1 class="overview-title" id="game-title">Loading…</h1>
        </header>

        <section class="overview-panel">
            <div id="carousel-container" class="go-carousel-wrap">
                <button type="button" id="prev-button" class="go-carousel-btn go-carousel-btn--prev" aria-label="Previous slide">&lsaquo;</button>
                <div class="go-carousel-viewport">
                    <div id="carousel" class="go-carousel"></div>
                </div>
                <button type="button" id="next-button" class="go-carousel-btn go-carousel-btn--next" aria-label="Next slide">&rsaquo;</button>
            </div>

            <div class="overview-body">
                <p id="game-description" class="overview-description">Loading…</p>

                <div id="links-section" class="overview-links" hidden>
                    <h2 class="overview-subtitle">Related links</h2>
                    <ul id="links-list" class="overview-links-list"></ul>
                </div>

                <div id="unity-container" class="unity-block">
                    <button type="button" id="play-button" class="go-play-btn" hidden>Play in browser</button>
                    <iframe id="unity-iframe" title="Unity build" class="unity-iframe" hidden></iframe>
                </div>
            </div>
        </section>

        <section id="devlogs-section" class="overview-devlogs" hidden>
            <h2 class="overview-subtitle">Devlogs</h2>
            <div id="devlogs-container" class="devlogs-container"></div>
        </section>
    </main>

    <footer class="site-footer site-footer--compact">
        <p class="footer-copy">&copy; 2026 Pedro Neves</p>
    </footer>

    <button type="button" class="lights-toggle" id="lights-toggle" aria-pressed="false" title="Bright theme or dark green room">
        <span class="lights-toggle__icon" aria-hidden="true">◐</span>
        <span class="lights-toggle__text">Turn off the lights</span>
    </button>

    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="js/ambient.js"></script>
    <script src="js/projects-config.js?v=2"></script>
    <script src="js/gameoverview.js?v=2"></script>
</body>
</html>
